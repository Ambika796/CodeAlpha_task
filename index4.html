<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player Pro</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

<div class="player">

    <!-- Album Cover -->
    <img id="cover" class="cover" src="" alt="Album Cover">

    <!-- Song Info -->
    <div class="song-info">
        <h2 id="title">Song Title</h2>
        <p id="artist">Artist Name</p>
    </div>

    <audio id="audio"></audio>

    <!-- Time -->
    <div class="time">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
    </div>

    <!-- Progress Bar -->
    <input type="range" id="progress" value="0">

    <!-- Controls -->
    <div class="controls">

        <button id="shuffle" class="tooltip">
            🔀
            <span>Shuffle</span>
        </button>

        <button id="prev" class="tooltip">
            ⏮
            <span>Previous Song</span>
        </button>

        <button id="play" class="tooltip">
            ▶
            <span>Play / Pause</span>
        </button>

        <button id="next" class="tooltip">
            ⏭
            <span>Next Song</span>
        </button>

        <button id="repeat" class="tooltip">
            🔁
            <span>Repeat Song</span>
        </button>

    </div>

    <!-- Volume -->
    <div class="volume">

        <span class="tooltip volume-icon">
            🔊
            <span>Volume Control</span>
        </span>

        <input type="range"
               id="volume"
               min="0"
               max="1"
               step="0.1">

    </div>

</div>

<script src="script2.js"></script>

</body>
</html>
